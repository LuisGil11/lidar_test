workflows:
  ios-lidar-tennis-test:
    name: LiDAR Tennis Test iOS App
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "LiDARTennisTest.xcodeproj"
        XCODE_SCHEME: "LiDARTennisTest"
        BUNDLE_ID: "com.giluis.LiDARTennisTest"
        APPLE_ID: $APPLE_ID
        APP_SPECIFIC_PASSWORD: $APP_SPECIFIC_PASSWORD
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up automatic code signing with Apple ID
        script: |
          # Configurar Bundle ID
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = '"$BUNDLE_ID"';/g' "$XCODE_PROJECT/project.pbxproj"
          
          # Habilitar automatic signing
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$XCODE_PROJECT/project.pbxproj"
          
          # Obtener Team ID del Apple ID
          xcrun altool --list-providers -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD" || true
          
          # Configurar Team ID (se obtendra automaticamente con -allowProvisioningUpdates)
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "";/g' "$XCODE_PROJECT/project.pbxproj"
      - name: Get CocoaPods dependencies (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found, skipping CocoaPods"
          fi
      - name: Build and archive
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $HOME/Library/Developer/Xcode/Archives/LiDARTennisTest.xcarchive \
            -allowProvisioningUpdates \
            clean archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $HOME/Library/Developer/Xcode/Archives/LiDARTennisTest.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /dev/null \
            -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true
